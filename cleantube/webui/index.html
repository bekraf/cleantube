<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cleantube</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%232a78d6'/%3E%3Cpath d='M6 4.5v7l6-3.5z' fill='%23fff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/style.css">

<body>
<header class="topbar">
  <div class="brand">

    <a href="#dashboard" id="tab-dashboard" role="tab">Dashboard</a>

<main>
  <section id="panel-dashboard" class="panel" role="tabpanel" hidden></section>

    <div id="timeline"></div>
  </section>

<div id="tooltip" class="tooltip" hidden></div>
<script src="/app.js"></script>

</html>
